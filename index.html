<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSFET Pulse Configurator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-sec: #f5f5f4;
    --bg-ter: #eeece8;
    --bg-info: #e6f1fb;
    --text: #1a1a18;
    --text-sec: #6b6b67;
    --text-ter: #9e9e9a;
    --text-info: #185fa5;
    --border: rgba(0,0,0,0.12);
    --border-sec: rgba(0,0,0,0.22);
    --border-pri: rgba(0,0,0,0.35);
    --border-info: #85b7eb;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-sec: #242422;
      --bg-ter: #2c2c2a;
      --bg-info: #0c2a44;
      --text: #e8e8e4;
      --text-sec: #9e9e9a;
      --text-ter: #6b6b67;
      --text-info: #85b7eb;
      --border: rgba(255,255,255,0.1);
      --border-sec: rgba(255,255,255,0.18);
      --border-pri: rgba(255,255,255,0.28);
      --border-info: #378add;
    }
  }

  body {
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    background: var(--bg-ter);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  .container { max-width: 900px; margin: 0 auto; }

  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 0.25rem;
    color: var(--text);
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-sec);
    margin-bottom: 1.5rem;
  }

  .section {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-ter);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.75rem;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
  @media (max-width: 600px) {
    .grid4 { grid-template-columns: 1fr 1fr; }
    .grid3 { grid-template-columns: 1fr 1fr; }
  }

  label {
    font-size: 11px;
    color: var(--text-sec);
    display: block;
    margin-bottom: 3px;
  }
  input[type=number], input[type=text], select {
    width: 100%;
    padding: 6px 8px;
    font-size: 13px;
    font-family: var(--font);
    border: 0.5px solid var(--border-sec);
    border-radius: var(--radius-md);
    background: var(--bg-sec);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=number]:focus, select:focus {
    border-color: var(--border-pri);
  }
  input[type=checkbox] { cursor: pointer; }

  .probe-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .probe-tab {
    padding: 5px 16px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-sec);
    background: var(--bg-sec);
    color: var(--text-sec);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .probe-tab.active {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border-pri);
  }
  .probe-panel { display: none; }
  .probe-panel.active { display: block; }

  .pulse-mode-row { display: flex; gap: 8px; margin-bottom: 0.75rem; align-items: center; flex-wrap: wrap; }
  .mode-btn {
    padding: 4px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-sec);
    background: var(--bg-sec);
    color: var(--text-sec);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: var(--bg-info);
    color: var(--text-info);
    border-color: var(--border-info);
  }

  .pulse-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 0.5rem; }
  .pulse-item {
    background: var(--bg-sec);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
  }
  .pulse-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .pulse-label { font-size: 12px; font-weight: 500; color: var(--text-sec); }
  .del-btn {
    font-size: 11px;
    color: #e24b4a;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: var(--font);
  }

  .add-btn {
    padding: 5px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-sec);
    background: none;
    color: var(--text-sec);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    width: 100%;
    margin-top: 4px;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--bg-sec); }

  .action-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .gen-btn {
    padding: 8px 20px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-pri);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font);
    transition: background 0.15s;
  }
  .gen-btn:hover { background: var(--bg-sec); }
  .gen-btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .gen-btn.primary:hover { opacity: 0.88; }

  .table-wrap { overflow-x: auto; margin-top: 0.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--font-mono); }
  th {
    background: var(--bg-sec);
    padding: 5px 8px;
    text-align: left;
    border-bottom: 0.5px solid var(--border);
    font-weight: 500;
    white-space: nowrap;
    font-family: var(--font);
    font-size: 11px;
    color: var(--text-sec);
  }
  td {
    padding: 4px 8px;
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }

  .out-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .copy-btn {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-sec);
    background: none;
    color: var(--text-sec);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--bg-sec); }
  .copy-btn.copied { color: #1D9E75; border-color: #1D9E75; }

  .tabs-output { display: flex; gap: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .out-tab {
    padding: 4px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-sec);
    background: var(--bg-sec);
    color: var(--text-sec);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .out-tab.active {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border-pri);
  }
  .out-panel { display: none; }
  .out-panel.active { display: block; }

  .info-row { display: flex; gap: 8px; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .info-chip {
    font-size: 11px;
    color: var(--text-sec);
    background: var(--bg-sec);
    border-radius: var(--radius-md);
    padding: 2px 8px;
    border: 0.5px solid var(--border);
  }

  .row-flex { display: flex; gap: 8px; align-items: flex-end; }
  .row-flex > * { flex: 1; }

  #output-section { display: none; }

  svg.preview { width: 100%; border-radius: var(--radius-md); background: var(--bg-sec); display: block; }
</style>
</head>
<body>
<div class="container">

  <h1>MOSFET pulse configurator</h1>
  <p class="subtitle">Depletion-mode MOSFET — piecewise linear pulse table + measurement scheme generator</p>

  <!-- Global timing -->
  <div class="section">
    <div class="section-title">Global timing</div>
    <div class="grid4">
      <div><label>t<sub>gap</sub> (μs)</label><input type="number" id="g_tgap" value="10" step="1" min="0"></div>
      <div><label>t<sub>rise</sub> (ns)</label><input type="number" id="g_trise" value="100" step="10" min="1"></div>
      <div><label>t<sub>fall</sub> (ns)</label><input type="number" id="g_tfall" value="100" step="10" min="1"></div>
      <div><label>N cycles</label><input type="number" id="g_ncycles" value="1" step="1" min="1"></div>
    </div>
    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <div style="flex:1; min-width:120px;"><label>V<sub>baseline</sub> gate (V)</label><input type="number" id="g_vbase" value="1.0" step="0.1"></div>
      <div style="flex:1; min-width:120px;"><label>V<sub>pulse</sub> gate (V)</label><input type="number" id="g_vpulse" value="0.0" step="0.1"></div>
    </div>
  </div>

  <!-- Probe config -->
  <div class="section">
    <div class="section-title">Probe configuration</div>
    <div class="probe-tabs">
      <div class="probe-tab active" onclick="switchProbe('gate')">Gate (G)</div>
      <div class="probe-tab" onclick="switchProbe('drain')">Drain (D)</div>
      <div class="probe-tab" onclick="switchProbe('source')">Source (S)</div>
      <div class="probe-tab" onclick="switchProbe('bulk')">Bulk (B)</div>
    </div>
    <div id="probe-gate" class="probe-panel active"></div>
    <div id="probe-drain" class="probe-panel"></div>
    <div id="probe-source" class="probe-panel"></div>
    <div id="probe-bulk" class="probe-panel"></div>
  </div>

  <!-- Measurement scheme params -->
  <div class="section">
    <div class="section-title">Measurement scheme</div>
    <div class="grid3">
      <div><label>t<sub>low</sub> — integration window (ns)</label><input type="number" id="m_tlow" value="100" step="10" min="1"></div>
      <div><label>t<sub>high</sub> — averaging time (ns)</label><input type="number" id="m_thigh" value="10" step="1" min="1"></div>
      <div><label>Max points / row</label><input type="number" id="m_maxpts" value="4000" step="100" min="1"></div>
    </div>
    <div class="grid2" style="margin-top:10px;">
      <div><label>Current range (A)</label><input type="number" id="m_irange" value="0.001" step="0.0001"></div>
      <div><label>Voltage range (V)</label><input type="number" id="m_vrange" value="2" step="0.5"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="gen-btn primary" onclick="generate()">Generate tables</button>
    <button class="gen-btn" onclick="exportCSV()">Export CSV</button>
  </div>

  <!-- Output -->
  <div class="section" id="output-section">
    <div class="section-title">Output</div>
    <div class="tabs-output">
      <div class="out-tab active" onclick="switchOut('pulse')">Pulse sequence</div>
      <div class="out-tab" onclick="switchOut('meas')">Measurement scheme</div>
      <div class="out-tab" onclick="switchOut('preview')">Waveform preview</div>
    </div>

    <div id="out-pulse" class="out-panel active">
      <div class="out-header">
        <div class="info-row" id="pulse-info" style="margin:0;"></div>
        <button class="copy-btn" onclick="copyTable('pulse-table-wrap', this)">Copy</button>
      </div>
      <div class="table-wrap" id="pulse-table-wrap"></div>
    </div>

    <div id="out-meas" class="out-panel">
      <div class="out-header">
        <div class="info-row" id="meas-info" style="margin:0;"></div>
        <button class="copy-btn" onclick="copyTable('meas-table-wrap', this)">Copy</button>
      </div>
      <div class="table-wrap" id="meas-table-wrap"></div>
    </div>

    <div id="out-preview" class="out-panel">
      <div id="preview-container"></div>
    </div>
  </div>

</div>

<script>
const probeState = {
  gate:   { mode: 'pulse',     pulses: [{ tpulse: 1000, repeat: 1, sweep: false, vlo: 0, vhi: 1, vstep: 0.1 }], constant: 1.0 },
  drain:  { mode: 'constant',  pulses: [],                                                                        constant: 1.8 },
  source: { mode: 'constant',  pulses: [],                                                                        constant: 0.0 },
  bulk:   { mode: 'constant',  pulses: [],                                                                        constant: 0.0 },
};
const probeColors = { gate: '#378ADD', drain: '#1D9E75', source: '#D85A30', bulk: '#D4537E' };
let currentProbe = 'gate';
let generatedData = null;

/* ── Probe panel rendering ── */
function switchProbe(p) {
  currentProbe = p;
  ['gate','drain','source','bulk'].forEach((k, i) => {
    document.querySelectorAll('.probe-tab')[i].classList.toggle('active', k === p);
    document.getElementById('probe-'+k).classList.toggle('active', k === p);
  });
  renderProbePanel(p);
}

function renderProbePanel(p) {
  const s = probeState[p];
  const isGate = p === 'gate';
  const el = document.getElementById('probe-'+p);

  const modeBtns = isGate
    ? `<button class="mode-btn ${s.mode==='pulse'?'active':''}" onclick="setMode('${p}','pulse')">Pulsed</button>
       <button class="mode-btn ${s.mode==='multipulse'?'active':''}" onclick="setMode('${p}','multipulse')">Multi-pulse</button>`
    : `<button class="mode-btn ${s.mode==='constant'?'active':''}" onclick="setMode('${p}','constant')">Constant</button>
       <button class="mode-btn ${s.mode==='pulse'?'active':''}" onclick="setMode('${p}','pulse')">Pulsed</button>
       <button class="mode-btn ${s.mode==='sweep'?'active':''}" onclick="setMode('${p}','sweep')">Sweep</button>`;

  let body = '';
  if (s.mode === 'constant') {
    body = `<div style="max-width:160px;"><label>Voltage (V)</label>
      <input type="number" step="0.1" value="${s.constant}"
        onchange="probeState['${p}'].constant=parseFloat(this.value)"></div>`;
  } else if (s.mode === 'sweep') {
    if (!s.sweep) s.sweep = { vstart: 0, vstop: 2, vstep: 0.2, tpulse: 1000 };
    const sw = s.sweep;
    body = `<div class="grid4">
      <div><label>V start (V)</label><input type="number" step="0.1" value="${sw.vstart}" onchange="probeState['${p}'].sweep.vstart=parseFloat(this.value)"></div>
      <div><label>V stop (V)</label><input type="number" step="0.1" value="${sw.vstop}" onchange="probeState['${p}'].sweep.vstop=parseFloat(this.value)"></div>
      <div><label>V step (V)</label><input type="number" step="0.05" value="${sw.vstep}" onchange="probeState['${p}'].sweep.vstep=parseFloat(this.value)"></div>
      <div><label>t<sub>pulse</sub> (μs)</label><input type="number" step="1" value="${sw.tpulse}" onchange="probeState['${p}'].sweep.tpulse=parseFloat(this.value)"></div>
    </div>`;
  } else {
    // pulse / multipulse
    let items = '';
    s.pulses.forEach((pu, i) => {
      const extraV = isGate ? '' : `<div><label>Voltage (V)</label>
        <input type="number" step="0.1" value="${pu.vlo !== undefined ? pu.vlo : 0}"
          onchange="probeState['${p}'].pulses[${i}].vlo=parseFloat(this.value)"></div>`;
      const sweepToggle = (isGate && s.mode === 'multipulse') ? `
        <div style="margin-top:6px;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" ${pu.sweep?'checked':''} onchange="probeState['${p}'].pulses[${i}].sweep=this.checked;renderProbePanel('${p}')">
            Sweep voltage across repeats
          </label>
          ${pu.sweep ? `<div class="grid3" style="margin-top:6px;">
            <div><label>V lo (V)</label><input type="number" step="0.1" value="${pu.vlo||0}" onchange="probeState['${p}'].pulses[${i}].vlo=parseFloat(this.value)"></div>
            <div><label>V hi (V)</label><input type="number" step="0.1" value="${pu.vhi||1}" onchange="probeState['${p}'].pulses[${i}].vhi=parseFloat(this.value)"></div>
            <div><label>V step (V)</label><input type="number" step="0.1" value="${pu.vstep||0.1}" onchange="probeState['${p}'].pulses[${i}].vstep=parseFloat(this.value)"></div>
          </div>` : ''}
        </div>` : '';

      items += `<div class="pulse-item">
        <div class="pulse-item-header">
          <span class="pulse-label">Segment ${i+1}</span>
          <button class="del-btn" onclick="delPulse('${p}',${i})">Remove</button>
        </div>
        <div class="grid3">
          <div><label>t<sub>pulse</sub> (μs)</label><input type="number" step="1" min="0" value="${pu.tpulse}" onchange="probeState['${p}'].pulses[${i}].tpulse=parseFloat(this.value)"></div>
          <div><label>Repeat</label><input type="number" step="1" min="1" value="${pu.repeat||1}" onchange="probeState['${p}'].pulses[${i}].repeat=parseInt(this.value)"></div>
          ${extraV}
        </div>
        ${sweepToggle}
      </div>`;
    });
    body = `<div class="pulse-list">${items}</div>
      <button class="add-btn" onclick="addPulse('${p}')">+ Add segment</button>`;
  }

  el.innerHTML = `<div class="pulse-mode-row"><span style="font-size:12px;color:var(--text-sec);">Mode:</span>${modeBtns}</div>${body}`;
}

function setMode(p, m) {
  probeState[p].mode = m;
  if ((m==='pulse'||m==='multipulse') && probeState[p].pulses.length===0)
    probeState[p].pulses = [{ tpulse: 1000, repeat: 1, sweep: false, vlo: 0, vhi: 1, vstep: 0.1 }];
  renderProbePanel(p);
}

function addPulse(p) {
  probeState[p].pulses.push({ tpulse: 1000, repeat: 1, sweep: false, vlo: 0, vhi: 1, vstep: 0.1 });
  renderProbePanel(p);
}

function delPulse(p, i) {
  probeState[p].pulses.splice(i, 1);
  renderProbePanel(p);
}

/* ── Output tab switching ── */
function switchOut(tab) {
  ['pulse','meas','preview'].forEach((t, i) => {
    document.querySelectorAll('.out-tab')[i].classList.toggle('active', t === tab);
    document.getElementById('out-'+t).classList.toggle('active', t === tab);
  });
}

/* ── Parameter helpers ── */
function getParams() {
  return {
    tgap:    parseFloat(document.getElementById('g_tgap').value)    * 1e-6,
    trise:   parseFloat(document.getElementById('g_trise').value)   * 1e-9,
    tfall:   parseFloat(document.getElementById('g_tfall').value)   * 1e-9,
    ncycles: parseInt(document.getElementById('g_ncycles').value),
    vbase:   parseFloat(document.getElementById('g_vbase').value),
    vpulse:  parseFloat(document.getElementById('g_vpulse').value),
    tlow:    parseFloat(document.getElementById('m_tlow').value)    * 1e-9,
    thigh:   parseFloat(document.getElementById('m_thigh').value)   * 1e-9,
    maxpts:  parseInt(document.getElementById('m_maxpts').value),
    irange:  parseFloat(document.getElementById('m_irange').value),
    vrange:  parseFloat(document.getElementById('m_vrange').value),
  };
}

/* ── Waveform builders ── */
function buildGateWaveform(params) {
  const { tgap, trise, tfall, vbase, vpulse, ncycles } = params;
  const gs = probeState.gate;
  let pts = [{ t: 0, v: vbase }];

  for (let c = 0; c < ncycles; c++) {
    let segs = [];
    if (gs.mode === 'pulse') {
      gs.pulses.forEach(pu => {
        for (let r = 0; r < (pu.repeat||1); r++)
          segs.push({ tpulse: pu.tpulse * 1e-6, voltage: vpulse });
      });
    } else {
      gs.pulses.forEach(pu => {
        const reps = pu.repeat || 1;
        if (pu.sweep) {
          const steps = Math.max(1, Math.round(Math.abs(pu.vhi - pu.vlo) / (pu.vstep||0.1)));
          for (let s = 0; s <= steps; s++) {
            const v = pu.vlo + s * (pu.vstep||0.1) * Math.sign(pu.vhi - pu.vlo);
            for (let r = 0; r < reps; r++)
              segs.push({ tpulse: pu.tpulse * 1e-6, voltage: v });
          }
        } else {
          for (let r = 0; r < reps; r++)
            segs.push({ tpulse: pu.tpulse * 1e-6, voltage: vpulse });
        }
      });
    }
    segs.forEach(seg => {
      const last = pts[pts.length-1].t;
      pts.push({ t: last + tgap,                           v: vbase     });
      pts.push({ t: last + tgap + trise,                   v: seg.voltage });
      pts.push({ t: last + tgap + trise + seg.tpulse,      v: seg.voltage });
      pts.push({ t: last + tgap + trise + seg.tpulse + tfall, v: vbase  });
    });
  }
  return pts;
}

function buildProbeWaveform(probe, gateWfm, params) {
  const s = probeState[probe];
  const { tgap, trise, tfall } = params;
  const tTotal = gateWfm[gateWfm.length-1].t;

  if (s.mode === 'constant') return [{ t: 0, v: s.constant }, { t: tTotal, v: s.constant }];

  if (s.mode === 'sweep') {
    const sw = s.sweep || { vstart:0, vstop:2, vstep:0.2 };
    const steps = Math.max(1, Math.round(Math.abs(sw.vstop - sw.vstart) / (sw.vstep||0.1)));
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      pts.push({ t: (i / steps) * tTotal, v: sw.vstart + i * (sw.vstep||0.1) * Math.sign(sw.vstop - sw.vstart) });
    }
    return pts;
  }

  // pulsed probe
  let pts = [{ t: 0, v: s.constant||0 }];
  s.pulses.forEach(pu => {
    for (let r = 0; r < (pu.repeat||1); r++) {
      const last = pts[pts.length-1].t;
      const vl = pu.vlo !== undefined ? pu.vlo : 0;
      pts.push({ t: last + tgap,                          v: s.constant||0 });
      pts.push({ t: last + tgap + trise,                  v: vl });
      pts.push({ t: last + tgap + trise + pu.tpulse*1e-6, v: vl });
      pts.push({ t: last + tgap + trise + pu.tpulse*1e-6 + tfall, v: s.constant||0 });
    }
  });
  if (pts[pts.length-1].t < tTotal) pts.push({ t: tTotal, v: s.constant||0 });
  return pts;
}

function interp(wfm, t) {
  for (let i = 0; i < wfm.length-1; i++) {
    if (t >= wfm[i].t && t <= wfm[i+1].t) {
      const span = wfm[i+1].t - wfm[i].t;
      if (span < 1e-30) return wfm[i+1].v;
      return wfm[i].v + (t - wfm[i].t) / span * (wfm[i+1].v - wfm[i].v);
    }
  }
  return wfm[wfm.length-1].v;
}

/* ── Main generate ── */
function generate() {
  const params = getParams();
  const gWfm = buildGateWaveform(params);
  const dWfm = buildProbeWaveform('drain',  gWfm, params);
  const sWfm = buildProbeWaveform('source', gWfm, params);
  const bWfm = buildProbeWaveform('bulk',   gWfm, params);
  const tTotal = gWfm[gWfm.length-1].t;

  // Unified time axis
  const allT = [...new Set([
    ...gWfm.map(p=>p.t), ...dWfm.map(p=>p.t),
    ...sWfm.map(p=>p.t), ...bWfm.map(p=>p.t),
  ])].sort((a,b) => a-b);

  const pulseRows = allT.map(t => ({
    t, g: interp(gWfm, t), d: interp(dWfm, t),
    s: interp(sWfm, t),   b: interp(bWfm, t),
  }));

  // Measurement scheme
  const { tlow, thigh, maxpts, irange, vrange } = params;
  const tPerPt  = tlow + thigh;
  const tPerRow = maxpts * tPerPt;
  const numFull = Math.floor(tTotal / tPerRow);
  const lastPts = Math.ceil((tTotal - numFull * tPerRow) / tPerPt);
  const totalRows = numFull + (lastPts > 0 ? 1 : 0);

  const measRows = [];
  for (let r = 0; r < totalRows; r++) {
    measRows.push({
      start:     r * tPerRow,
      npts:      r < numFull ? maxpts : lastPts,
      cycleDur:  tPerPt,
      avgTime:   thigh,
      irange,
      vrange,
    });
  }

  generatedData = { pulseRows, measRows, tTotal, gWfm, dWfm, sWfm, bWfm, tPerPt };
  renderPulseTable(pulseRows, tTotal);
  renderMeasTable(measRows, tTotal, tPerPt);
  renderPreview(gWfm, dWfm, sWfm, bWfm, tTotal);
  document.getElementById('output-section').style.display = '';
}

/* ── Table renderers ── */
function fmtE(v) { return v.toExponential(4); }
function fmtF(v, d=4) { return Number(v).toFixed(d); }

function renderPulseTable(rows, tTotal) {
  document.getElementById('pulse-info').innerHTML =
    `<span class="info-chip">Points: ${rows.length}</span>
     <span class="info-chip">Total time: ${(tTotal*1e6).toFixed(3)} μs</span>`;

  let html = `<table><thead><tr>
    <th>Time (s)</th><th>V_gate (V)</th><th>V_drain (V)</th><th>V_source (V)</th><th>V_bulk (V)</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    html += `<tr>
      <td>${fmtE(r.t)}</td><td>${fmtF(r.g)}</td><td>${fmtF(r.d)}</td>
      <td>${fmtF(r.s)}</td><td>${fmtF(r.b)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('pulse-table-wrap').innerHTML = html;
}

function renderMeasTable(rows, tTotal, tPerPt) {
  const totalPts = rows.reduce((a,r) => a + r.npts, 0);
  document.getElementById('meas-info').innerHTML =
    `<span class="info-chip">Rows: ${rows.length}</span>
     <span class="info-chip">Total pts: ${totalPts}</span>
     <span class="info-chip">Meas time: ${(totalPts*tPerPt*1e6).toFixed(3)} μs</span>`;

  let html = `<table><thead><tr>
    <th>Start time (s)</th><th>N points</th><th>Cycle time (s)</th>
    <th>Avg time (s)</th><th>I range (A)</th><th>V range (V)</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    html += `<tr>
      <td>${fmtE(r.start)}</td><td>${r.npts}</td><td>${fmtE(r.cycleDur)}</td>
      <td>${fmtE(r.avgTime)}</td><td>${fmtE(r.irange)}</td><td>${fmtF(r.vrange,2)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('meas-table-wrap').innerHTML = html;
}

/* ── Waveform preview ── */
function renderPreview(gWfm, dWfm, sWfm, bWfm, tTotal) {
  const W = 660, H = 200, padL = 38, padR = 12, padT = 10, padB = 26;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  const allV = [...gWfm,...dWfm,...sWfm,...bWfm].map(p=>p.v);
  const vMin = Math.min(...allV) - 0.1;
  const vMax = Math.max(...allV) + 0.1;
  const vSpan = vMax - vMin || 1;

  const tx = t => padL + (t / tTotal) * plotW;
  const ty = v => padT + (1 - (v - vMin) / vSpan) * plotH;

  function path(wfm, color) {
    const d = wfm.map((p,i) => `${i===0?'M':'L'}${tx(p.t).toFixed(1)},${ty(p.v).toFixed(1)}`).join(' ');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>`;
  }

  let svg = `<svg class="preview" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Axes
  svg += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>`;
  svg += `<line x1="${padL}" y1="${padT+plotH}" x2="${padL+plotW}" y2="${padT+plotH}" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>`;

  // Grid + Y labels
  [0, 0.5, 1].forEach(f => {
    const v = vMin + f * vSpan;
    const y = ty(v);
    svg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+plotW}" y2="${y.toFixed(1)}" stroke="currentColor" stroke-width="0.3" opacity="0.15"/>`;
    svg += `<text x="${padL-4}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="currentColor" opacity="0.5">${v.toFixed(1)}</text>`;
  });

  // X labels
  [0, 0.25, 0.5, 0.75, 1].forEach(f => {
    const x = padL + f * plotW;
    svg += `<text x="${x.toFixed(1)}" y="${padT+plotH+14}" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.5">${(f*tTotal*1e6).toFixed(2)}μs</text>`;
  });

  // Waveforms
  svg += path(gWfm, probeColors.gate);
  svg += path(dWfm, probeColors.drain);
  svg += path(sWfm, probeColors.source);
  svg += path(bWfm, probeColors.bulk);

  // Legend
  const legend = [['G', probeColors.gate], ['D', probeColors.drain], ['S', probeColors.source], ['B', probeColors.bulk]];
  legend.forEach(([lbl, col], i) => {
    const lx = padL + 8 + i * 54;
    svg += `<line x1="${lx}" y1="${padT+7}" x2="${lx+16}" y2="${padT+7}" stroke="${col}" stroke-width="2"/>`;
    svg += `<text x="${lx+20}" y="${padT+11}" font-size="11" fill="${col}" font-weight="500">${lbl}</text>`;
  });

  // Y axis label
  svg += `<text x="10" y="${padT + plotH/2}" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.45" transform="rotate(-90 10 ${padT + plotH/2})">Voltage (V)</text>`;

  svg += '</svg>';
  document.getElementById('preview-container').innerHTML = svg;
}

/* ── Copy table ── */
function copyTable(id, btn) {
  const rows = document.getElementById(id).querySelectorAll('tr');
  const text = [...rows].map(r => [...r.querySelectorAll('th,td')].map(c=>c.textContent).join('\t')).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
  });
}

/* ── CSV export ── */
function exportCSV() {
  if (!generatedData) generate();
  const { pulseRows, measRows } = generatedData;
  let csv = 'Time_s,V_gate_V,V_drain_V,V_source_V,V_bulk_V\n';
  pulseRows.forEach(r => {
    csv += `${r.t.toExponential(6)},${r.g.toFixed(4)},${r.d.toFixed(4)},${r.s.toFixed(4)},${r.b.toFixed(4)}\n`;
  });
  csv += '\nMeasurement Scheme\nStart_s,N_points,Cycle_s,Avg_s,I_range_A,V_range_V\n';
  measRows.forEach(r => {
    csv += `${r.start.toExponential(6)},${r.npts},${r.cycleDur.toExponential(6)},${r.avgTime.toExponential(6)},${r.irange.toExponential(3)},${r.vrange}\n`;
  });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], {type:'text/csv'})),
    download: 'pulse_sequence.csv'
  });
  a.click();
}

/* ── Init ── */
['gate','drain','source','bulk'].forEach(p => renderProbePanel(p));
