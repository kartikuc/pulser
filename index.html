<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Draw</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;--bg4:#e6f1fb;
  --tx:#1a1a18;--tx2:#6b6b67;--tx3:#9e9e9a;--tx4:#185fa5;
  --bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--bd3:rgba(0,0,0,.35);--bd4:#85b7eb;
  --r:8px;--r2:12px;--f:-apple-system,'Segoe UI',system-ui,sans-serif;--fm:'SF Mono','Fira Code',monospace;
  --canvas:#f8f7f5;--grid:rgba(0,0,0,.06);--gridm:rgba(0,0,0,.12);
  --seg-c:#378ADD;--seg-done:#1D9E75;--node-r:7;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--bg4:#0c2a44;
    --tx:#e8e8e4;--tx2:#9e9e9a;--tx3:#6b6b67;--tx4:#85b7eb;
    --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.18);--bd3:rgba(255,255,255,.28);--bd4:#378add;
    --canvas:#202020;--grid:rgba(255,255,255,.05);--gridm:rgba(255,255,255,.1);
  }
}
body{font-family:var(--f);font-size:14px;color:var(--tx);background:var(--bg3);min-height:100vh;padding:1.5rem 1rem 3rem}
.wrap{max-width:960px;margin:0 auto}
h1{font-size:18px;font-weight:500;margin-bottom:.2rem}
.sub{font-size:13px;color:var(--tx2);margin-bottom:1.25rem}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--r2);padding:1rem 1.25rem;margin-bottom:1rem}
.clabel{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.65rem}
.row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
input[type=number],input[type=text],select{width:100%;padding:5px 8px;font-size:13px;font-family:var(--f);border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);outline:none}
input[type=number]:focus,select:focus{border-color:var(--bd3)}
.fld{flex:1;min-width:80px}

/* toolbar */
.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem;align-items:center}
.tool-btn{padding:5px 13px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);cursor:pointer;font-size:12px;font-family:var(--f);transition:all .15s}
.tool-btn:hover{background:var(--bg3)}
.tool-btn.active{background:var(--bg4);color:var(--tx4);border-color:var(--bd4)}
.tool-sep{width:.5px;height:20px;background:var(--bd2);margin:0 2px}
.tool-btn.danger{color:#e24b4a}
.tool-btn.primary{background:var(--tx);color:var(--bg);border-color:var(--tx);font-weight:500}
.tool-btn.primary:hover{opacity:.88}

/* canvas */
.canvas-wrap{position:relative;overflow:hidden;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--canvas);touch-action:none;cursor:crosshair}
#pulseCanvas{display:block;width:100%;height:340px}

/* segment list */
.seg-list{display:flex;flex-direction:column;gap:5px;margin-top:.5rem}
.seg-row{display:flex;align-items:center;gap:6px;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:6px 9px;cursor:pointer;transition:border-color .15s}
.seg-row.selected{border-color:var(--bd4);background:var(--bg4)}
.seg-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.seg-title{font-size:12px;font-weight:500;flex:1}
.seg-info{font-size:11px;color:var(--tx3);font-family:var(--fm)}
.seg-del{font-size:11px;color:#e24b4a;cursor:pointer;background:none;border:none;padding:0 2px;font-family:var(--f);flex-shrink:0}
.seg-inputs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}

/* output table */
.table-wrap{overflow-x:auto;margin-top:.5rem}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--fm)}
th{background:var(--bg2);padding:5px 8px;text-align:left;border-bottom:.5px solid var(--bd);font-weight:500;white-space:nowrap;font-family:var(--f);font-size:11px;color:var(--tx2)}
td{padding:4px 8px;border-bottom:.5px solid var(--bd);white-space:nowrap;color:var(--tx)}
tr:last-child td{border-bottom:none}
tr.highlight td{background:var(--bg4)}

.info-chip{font-size:11px;color:var(--tx2);background:var(--bg2);border-radius:var(--r);padding:2px 8px;border:.5px solid var(--bd);display:inline-block}
.out-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:6px}
.copy-btn{font-size:11px;padding:3px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:none;color:var(--tx2);cursor:pointer;font-family:var(--f)}
.copy-btn.ok{color:#1D9E75;border-color:#1D9E75}
#output-section{display:none}
.hint{font-size:11px;color:var(--tx3);margin-left:auto}

/* probe color chips */
.probe-colors{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--tx2)}
.pc-dot{width:10px;height:10px;border-radius:50%}

/* grid global params */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:560px){.g4,.g3{grid-template-columns:1fr 1fr}.seg-inputs{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
<h1>MOSFET pulse draw</h1>
<p class="sub">Draw piecewise-linear waveforms on the canvas — click, drag, snap — then generate the table instantly.</p>

<!-- Probe selector + global timing -->
<div class="card">
  <div class="clabel">Active probe</div>
  <div class="row" style="margin-bottom:10px">
    <button class="tool-btn active" id="pb-gate"   onclick="setProbe('gate')">Gate (G)</button>
    <button class="tool-btn"        id="pb-drain"  onclick="setProbe('drain')">Drain (D)</button>
    <button class="tool-btn"        id="pb-source" onclick="setProbe('source')">Source (S)</button>
    <button class="tool-btn"        id="pb-bulk"   onclick="setProbe('bulk')">Bulk (B)</button>
    <div class="tool-sep"></div>
    <div class="probe-colors">
      <div class="pc"><div class="pc-dot" style="background:#378ADD"></div>G</div>
      <div class="pc"><div class="pc-dot" style="background:#1D9E75"></div>D</div>
      <div class="pc"><div class="pc-dot" style="background:#D85A30"></div>S</div>
      <div class="pc"><div class="pc-dot" style="background:#D4537E"></div>B</div>
    </div>
  </div>
  <div class="g4">
    <div><label>V<sub>min</sub> (V)</label><input type="number" id="v_min" value="-1" step="0.5" onchange="redraw()"></div>
    <div><label>V<sub>max</sub> (V)</label><input type="number" id="v_max" value="2"  step="0.5" onchange="redraw()"></div>
    <div><label>T<sub>total</sub> (μs)</label><input type="number" id="t_total" value="100" step="10" min="1" onchange="redraw()"></div>
    <div><label>t<sub>rise/fall</sub> (ns)</label><input type="number" id="t_rf" value="100" step="10" min="1"></div>
  </div>
</div>

<!-- Draw canvas -->
<div class="card">
  <div class="toolbar">
    <button class="tool-btn active" id="tool-add"   onclick="setTool('add')">✦ Add node</button>
    <button class="tool-btn"       id="tool-move"   onclick="setTool('move')">⟡ Move</button>
    <button class="tool-btn"       id="tool-del"    onclick="setTool('del')">✕ Delete</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="snapToGrid()">Snap to grid</button>
    <button class="tool-btn" onclick="clearProbe()">Clear probe</button>
    <button class="tool-btn" onclick="clearAll()">Clear all</button>
    <div class="tool-sep"></div>
    <button class="tool-btn primary" onclick="generate()">Generate table ↓</button>
    <span class="hint">Click canvas to add nodes · drag to move · right-click removes</span>
  </div>
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="pulseCanvas"></canvas>
  </div>
</div>

<!-- Segment editor -->
<div class="card" id="seg-card">
  <div class="clabel">Segments — <span id="probe-name" style="color:var(--tx2)">Gate</span></div>
  <div id="seg-list" class="seg-list"></div>
  <div style="margin-top:8px;font-size:11px;color:var(--tx3)">Click a segment to edit its exact values.</div>
</div>

<!-- Global measurement params -->
<div class="card">
  <div class="clabel">Measurement scheme params</div>
  <div class="g4">
    <div><label>t<sub>low</sub> — integration (ns)</label><input type="number" id="m_tlow" value="100" step="10"></div>
    <div><label>t<sub>high</sub> — avg time (ns)</label><input type="number" id="m_thigh" value="10" step="1"></div>
    <div><label>Max pts / row</label><input type="number" id="m_maxpts" value="4000" step="100"></div>
    <div><label>I range (A)</label><input type="number" id="m_irange" value="0.001" step="0.0001"></div>
  </div>
</div>

<!-- Output -->
<div id="output-section" class="card">
  <div class="clabel">Output</div>
  <div style="display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap">
    <button class="tool-btn active" id="ot-pulse" onclick="switchOut('pulse')">Pulse sequence</button>
    <button class="tool-btn"       id="ot-meas"  onclick="switchOut('meas')">Measurement scheme</button>
  </div>
  <div id="op-pulse">
    <div class="out-hdr">
      <span id="pulse-chips"></span>
      <button class="copy-btn" onclick="copyTbl('pulse-tbl',this)">Copy</button>
    </div>
    <div class="table-wrap"><table id="pulse-tbl"></table></div>
  </div>
  <div id="op-meas" style="display:none">
    <div class="out-hdr">
      <span id="meas-chips"></span>
      <button class="copy-btn" onclick="copyTbl('meas-tbl',this)">Copy</button>
    </div>
    <div class="table-wrap"><table id="meas-tbl"></table></div>
  </div>
</div>
</div>

<script>
/* ─── State ─────────────────────────────────────────────── */
const PROBES = ['gate','drain','source','bulk'];
const PC = { gate:'#378ADD', drain:'#1D9E75', source:'#D85A30', bulk:'#D4537E' };
const PN = { gate:'Gate', drain:'Drain', source:'Source', bulk:'Bulk' };

// Each probe stores an array of {t, v} nodes (sorted by t)
// t in [0,1] (fraction of total time), v in [0,1] (fraction of voltage range)
const state = {
  probe: 'gate',
  tool: 'add',
  nodes: { gate:[], drain:[], source:[], bulk:[] },
  drag: null,    // { probe, idx }
  selSeg: null,  // { probe, idx } — selected segment for editor
};

/* ─── Canvas setup ─────────────────────────────────────── */
const canvas = document.getElementById('pulseCanvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
const PAD = { l:46, r:12, t:12, b:36 };

function resize() {
  DPR = devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = 340;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx.scale(DPR, DPR);
  redraw();
}

function plotW() { return W - PAD.l - PAD.r; }
function plotH() { return H - PAD.t - PAD.b; }
function tx(frac) { return PAD.l + frac * plotW(); }
function ty(frac) { return PAD.t + (1-frac) * plotH(); }
function invTx(px) { return (px - PAD.l) / plotW(); }
function invTy(py) { return 1 - (py - PAD.t) / plotH(); }

function vMin() { return parseFloat(document.getElementById('v_min').value)||0; }
function vMax() { return parseFloat(document.getElementById('v_max').value)||1; }
function tTotal() { return parseFloat(document.getElementById('t_total').value)||100; }

// Convert node frac→real
function nodeToReal(n) {
  const vm = vMin(), vM = vMax(), tt = tTotal();
  return { t: n.t * tt, v: vm + n.v * (vM - vm) };
}
function realToFrac(t, v) {
  const vm = vMin(), vM = vMax(), tt = tTotal();
  return { t: t/tt, v: (v-vm)/(vM-vm) };
}

/* ─── Drawing ────────────────────────────────────────────── */
function redraw() {
  ctx.clearRect(0,0,W,H);
  drawGrid();
  PROBES.forEach(p => {
    if (p !== state.probe) drawProbeWfm(p, PC[p], 0.35);
  });
  drawProbeWfm(state.probe, PC[state.probe], 1);
  drawNodes(state.probe);
  renderSegList();
}

function drawGrid() {
  const vm = vMin(), vM = vMax(), tt = tTotal();
  ctx.save();
  // Background
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--canvas').trim()||'#f8f7f5';
  ctx.fillRect(0,0,W,H);

  // Horizontal grid lines
  const vTicks = niceTicks(vm, vM, 5);
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.font = '11px -apple-system,sans-serif';
  vTicks.forEach(v => {
    const frac = (v-vm)/(vM-vm);
    if (frac < 0 || frac > 1) return;
    const y = ty(frac);
    ctx.strokeStyle = (v===0) ? 'rgba(120,120,100,.3)' : (frac===0||frac===1) ? 'rgba(0,0,0,.15)' : 'rgba(0,0,0,.07)';
    ctx.lineWidth = (v===0) ? 1 : .5;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(W-PAD.r,y); ctx.stroke();
    ctx.fillStyle = 'rgba(100,100,80,.6)';
    ctx.fillText(v.toFixed(1)+'V', PAD.l-4, y);
  });

  // Vertical grid lines
  const tTicks = niceTicks(0, tt, 6);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  tTicks.forEach(t => {
    const frac = t/tt;
    if (frac < 0 || frac > 1) return;
    const x = tx(frac);
    ctx.strokeStyle = 'rgba(0,0,0,.07)'; ctx.lineWidth = .5;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(x,PAD.t); ctx.lineTo(x,H-PAD.b); ctx.stroke();
    ctx.fillStyle = 'rgba(100,100,80,.6)';
    ctx.fillText(t+'μs', x, H-PAD.b+5);
  });

  // Axes
  ctx.strokeStyle = 'rgba(0,0,0,.2)'; ctx.lineWidth = .5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(PAD.l, PAD.t); ctx.lineTo(PAD.l, H-PAD.b); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD.l, H-PAD.b); ctx.lineTo(W-PAD.r, H-PAD.b); ctx.stroke();
  ctx.restore();
}

function drawProbeWfm(probe, color, alpha) {
  const nodes = sortedNodes(probe);
  if (nodes.length < 2) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color; ctx.lineWidth = alpha > .5 ? 2 : 1.5; ctx.setLineDash([]);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  nodes.forEach((n,i) => {
    const x = tx(n.t), y = ty(n.v);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Fill under curve
  if (alpha > .5) {
    ctx.beginPath();
    nodes.forEach((n,i) => {
      const x = tx(n.t), y = ty(n.v);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    const last = nodes[nodes.length-1], first = nodes[0];
    ctx.lineTo(tx(last.t), ty(0)); ctx.lineTo(tx(first.t), ty(0)); ctx.closePath();
    ctx.globalAlpha = alpha * .07;
    ctx.fillStyle = color; ctx.fill();
  }
  ctx.restore();
}

function drawNodes(probe) {
  const nodes = sortedNodes(probe);
  const color = PC[probe];
  nodes.forEach((n, i) => {
    const x = tx(n.t), y = ty(n.v);
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y, 7, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 1.8; ctx.stroke();
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x,y, 3.5, 0, Math.PI*2); ctx.fill();
    // Label
    ctx.fillStyle = color; ctx.font = 'bold 10px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    const r = nodeToReal(n);
    ctx.fillText(r.v.toFixed(2)+'V', x, y - 10);
    ctx.restore();
  });
}

function sortedNodes(probe) {
  return [...state.nodes[probe]].sort((a,b) => a.t - b.t);
}

/* ─── Tool interactions ─────────────────────────────────── */
function setTool(t) {
  state.tool = t;
  document.getElementById('canvas-wrap').style.cursor = t==='move' ? 'grab' : t==='del' ? 'crosshair' : 'crosshair';
  ['add','move','del'].forEach(id => document.getElementById('tool-'+id).classList.toggle('active', id===t));
}
function setProbe(p) {
  state.probe = p;
  PROBES.forEach(k => document.getElementById('pb-'+k).classList.toggle('active', k===p));
  document.getElementById('probe-name').textContent = PN[p];
  state.selSeg = null;
  redraw();
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const cli = e.touches ? e.touches[0] : e;
  return { x: cli.clientX - r.left, y: cli.clientY - r.top };
}

function hitNode(probe, x, y, radius=12) {
  const nodes = state.nodes[probe];
  for (let i = 0; i < nodes.length; i++) {
    const nx = tx(nodes[i].t), ny = ty(nodes[i].v);
    if (Math.hypot(nx-x, ny-y) < radius) return i;
  }
  return -1;
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) return;
  const { x, y } = getPos(e);
  const t = clamp(invTx(x),0,1), v = clamp(invTy(y),0,1);
  const p = state.probe;
  if (state.tool === 'add') {
    const hit = hitNode(p, x, y);
    if (hit >= 0) { state.drag = { probe:p, idx:hit }; return; }
    state.nodes[p].push({ t, v });
    state.drag = { probe:p, idx: state.nodes[p].length-1 };
    redraw();
  } else if (state.tool === 'move') {
    const hit = hitNode(p, x, y);
    if (hit >= 0) { state.drag = { probe:p, idx:hit }; canvas.style.cursor='grabbing'; }
  } else if (state.tool === 'del') {
    const hit = hitNode(p, x, y);
    if (hit >= 0) { state.nodes[p].splice(hit,1); redraw(); }
  }
});

canvas.addEventListener('mousemove', e => {
  if (!state.drag) return;
  const { x, y } = getPos(e);
  const t = clamp(invTx(x),0,1), v = clamp(invTy(y),0,1);
  const { probe, idx } = state.drag;
  state.nodes[probe][idx] = { t, v };
  redraw();
});

canvas.addEventListener('mouseup', () => { state.drag = null; canvas.style.cursor = state.tool==='move'?'grab':'crosshair'; });
canvas.addEventListener('mouseleave', () => { state.drag = null; });
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const { x, y } = getPos(e);
  const hit = hitNode(state.probe, x, y);
  if (hit >= 0) { state.nodes[state.probe].splice(hit,1); redraw(); }
});

// Touch
canvas.addEventListener('touchstart', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', {clientX:e.touches[0].clientX, clientY:e.touches[0].clientY})); });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', {clientX:e.touches[0].clientX, clientY:e.touches[0].clientY})); });
canvas.addEventListener('touchend',   e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); });

/* ─── Segment editor ────────────────────────────────────── */
function renderSegList() {
  const probe = state.probe;
  const nodes = sortedNodes(probe);
  const list = document.getElementById('seg-list');
  if (nodes.length < 2) {
    list.innerHTML = '<div style="font-size:12px;color:var(--tx3);padding:6px 0">Add at least 2 nodes on the canvas to create segments.</div>';
    return;
  }
  let html = '';
  for (let i = 0; i < nodes.length-1; i++) {
    const a = nodeToReal(nodes[i]), b = nodeToReal(nodes[i+1]);
    const sel = state.selSeg && state.selSeg.probe===probe && state.selSeg.idx===i;
    html += `<div class="seg-row${sel?' selected':''}" onclick="selectSeg('${probe}',${i})">
      <div class="pc-dot" style="background:${PC[probe]}"></div>
      <span class="seg-title">Seg ${i+1}</span>
      <span class="seg-info">${a.t.toFixed(2)}μs→${b.t.toFixed(2)}μs &nbsp; ${a.v.toFixed(3)}V→${b.v.toFixed(3)}V</span>
      <button class="seg-del" onclick="event.stopPropagation();deleteSeg('${probe}',${i})">Remove</button>
    </div>`;
    if (sel) {
      html += `<div class="seg-inputs" id="seg-editor">
        <div><label>x1 (μs)</label><input type="number" step="0.1" value="${a.t.toFixed(3)}" onchange="updateNode('${probe}',${i},'t',+this.value)"></div>
        <div><label>y1 (V)</label><input type="number" step="0.01" value="${a.v.toFixed(4)}" onchange="updateNode('${probe}',${i},'v',+this.value)"></div>
        <div><label>x2 (μs)</label><input type="number" step="0.1" value="${b.t.toFixed(3)}" onchange="updateNode('${probe}',${i+1},'t',+this.value)"></div>
        <div><label>y2 (V)</label><input type="number" step="0.01" value="${b.v.toFixed(4)}" onchange="updateNode('${probe}',${i+1},'v',+this.value)"></div>
      </div>`;
    }
  }
  list.innerHTML = html;
}

function selectSeg(probe, idx) {
  if (state.selSeg && state.selSeg.probe===probe && state.selSeg.idx===idx) { state.selSeg = null; }
  else state.selSeg = { probe, idx };
  renderSegList();
}

function deleteSeg(probe, idx) {
  const nodes = sortedNodes(probe);
  // Remove the start node of segment (unless it's shared — just collapse the segment)
  // Find original index
  const n = nodes[idx];
  const origIdx = state.nodes[probe].findIndex(x => x === n || (Math.abs(x.t-n.t)<1e-9 && Math.abs(x.v-n.v)<1e-9));
  if (origIdx >= 0) { state.nodes[probe].splice(origIdx,1); }
  state.selSeg = null; redraw();
}

function updateNode(probe, segNodeIdx, axis, val) {
  const nodes = sortedNodes(probe);
  const n = nodes[segNodeIdx];
  const origIdx = state.nodes[probe].findIndex(x => x === n);
  if (origIdx < 0) return;
  const tt = tTotal(), vm = vMin(), vM = vMax();
  if (axis === 't') state.nodes[probe][origIdx].t = clamp(val/tt, 0, 1);
  if (axis === 'v') state.nodes[probe][origIdx].v = clamp((val-vm)/(vM-vm), 0, 1);
  redraw();
}

/* ─── Utilities ──────────────────────────────────────────── */
function clamp(v,mn,mx) { return Math.max(mn,Math.min(mx,v)); }

function niceTicks(lo, hi, n) {
  const raw = (hi-lo)/n;
  const exp = Math.pow(10, Math.floor(Math.log10(raw)));
  const nice = [1,2,2.5,5,10].find(f => f*exp >= raw) * exp;
  const start = Math.ceil(lo/nice)*nice;
  const ticks = [];
  for (let t=start; t<=hi+1e-9; t=+(t+nice).toFixed(10)) ticks.push(+t.toFixed(10));
  return ticks;
}

function snapToGrid() {
  const nodes = state.nodes[state.probe];
  const tt = tTotal(), vm = vMin(), vM = vMax();
  const tTicks = niceTicks(0,tt,6);
  const vTicks = niceTicks(vm,vM,5);
  nodes.forEach(n => {
    const rt = n.t*tt, rv = vm+n.v*(vM-vm);
    const st = tTicks.reduce((a,b) => Math.abs(b-rt)<Math.abs(a-rt)?b:a);
    const sv = vTicks.reduce((a,b) => Math.abs(b-rv)<Math.abs(a-rv)?b:a);
    n.t = clamp(st/tt,0,1); n.v = clamp((sv-vm)/(vM-vm),0,1);
  });
  redraw();
}
function clearProbe() { state.nodes[state.probe]=[]; state.selSeg=null; redraw(); }
function clearAll()   { PROBES.forEach(p => state.nodes[p]=[]); state.selSeg=null; redraw(); }

/* ─── Interpolation ─────────────────────────────────────── */
function interpAt(probe, t_frac) {
  const nodes = sortedNodes(probe);
  if (!nodes.length) return 0;
  if (nodes.length === 1) return nodes[0].v;
  if (t_frac <= nodes[0].t) return nodes[0].v;
  if (t_frac >= nodes[nodes.length-1].t) return nodes[nodes.length-1].v;
  for (let i=0; i<nodes.length-1; i++) {
    if (t_frac >= nodes[i].t && t_frac <= nodes[i+1].t) {
      const span = nodes[i+1].t - nodes[i].t;
      if (span < 1e-12) return nodes[i+1].v;
      return nodes[i].v + (t_frac - nodes[i].t)/span * (nodes[i+1].v - nodes[i].v);
    }
  }
  return nodes[nodes.length-1].v;
}

/* ─── Generate ───────────────────────────────────────────── */
function generate() {
  const tt = tTotal(), vm = vMin(), vM = vMax();
  const trf = parseFloat(document.getElementById('t_rf').value)*1e-9;
  const vSpan = vM - vm;

  // Collect all unique t fractions across all probes, plus rise/fall sub-points
  let tFracs = new Set();
  PROBES.forEach(p => {
    const nodes = sortedNodes(p);
    nodes.forEach(n => {
      tFracs.add(n.t);
      // Add rise/fall points if they make sense
      const dtFrac = trf / (tt*1e-6); // trf in s, tt in μs
      if (n.t > dtFrac) tFracs.add(Math.max(0, n.t - dtFrac));
      if (n.t < 1 - dtFrac) tFracs.add(Math.min(1, n.t + dtFrac));
    });
  });
  // Also always include 0 and 1
  tFracs.add(0); tFracs.add(1);
  const sortedT = [...tFracs].sort((a,b)=>a-b);

  // Build rows
  const rows = sortedT.map(tf => {
    const realT = tf * tt * 1e-6; // convert to seconds
    const row = { t: realT };
    PROBES.forEach(p => {
      const nodes = sortedNodes(p);
      if (!nodes.length) { row[p] = 0; return; }
      const vf = interpAt(p, tf);
      row[p] = vm + vf * vSpan;
    });
    return row;
  });

  // Measurement scheme
  const tlow  = parseFloat(document.getElementById('m_tlow').value)*1e-9;
  const thigh = parseFloat(document.getElementById('m_thigh').value)*1e-9;
  const maxpts= parseInt(document.getElementById('m_maxpts').value)||4000;
  const irange= parseFloat(document.getElementById('m_irange').value);
  const tPerPt = tlow + thigh;
  const totalT = tt*1e-6;
  const tPerRow= maxpts * tPerPt;
  const numFull= Math.floor(totalT/tPerRow);
  const lastPts= Math.ceil((totalT - numFull*tPerRow)/tPerPt);
  const measRows=[];
  for (let r=0; r<numFull+(lastPts>0?1:0); r++) {
    measRows.push({ start:r*tPerRow, npts:r<numFull?maxpts:lastPts, cycleDur:tPerPt, avgTime:thigh, irange });
  }

  renderPulseTable(rows, totalT);
  renderMeasTable(measRows, tPerPt);
  document.getElementById('output-section').style.display='';
}

function renderPulseTable(rows, totalT) {
  document.getElementById('pulse-chips').innerHTML =
    `<span class="info-chip">Points: ${rows.length}</span> &nbsp;
     <span class="info-chip">Total: ${(totalT*1e6).toFixed(3)} μs</span>`;

  let h = `<thead><tr><th>Time (s)</th><th>V_gate (V)</th><th>V_drain (V)</th><th>V_source (V)</th><th>V_bulk (V)</th></tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr><td>${r.t.toExponential(5)}</td><td>${r.gate.toFixed(4)}</td><td>${r.drain.toFixed(4)}</td><td>${r.source.toFixed(4)}</td><td>${r.bulk.toFixed(4)}</td></tr>`;
  });
  document.getElementById('pulse-tbl').innerHTML = h + '</tbody>';
}

function renderMeasTable(rows, tPerPt) {
  const total = rows.reduce((a,r)=>a+r.npts,0);
  document.getElementById('meas-chips').innerHTML =
    `<span class="info-chip">Rows: ${rows.length}</span> &nbsp;
     <span class="info-chip">Total pts: ${total}</span>`;

  let h = `<thead><tr><th>Start (s)</th><th>N pts</th><th>Cycle (s)</th><th>Avg (s)</th><th>I range (A)</th></tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr><td>${r.start.toExponential(5)}</td><td>${r.npts}</td><td>${r.cycleDur.toExponential(4)}</td><td>${r.avgTime.toExponential(4)}</td><td>${r.irange.toExponential(3)}</td></tr>`;
  });
  document.getElementById('meas-tbl').innerHTML = h + '</tbody>';
}

function switchOut(tab) {
  ['pulse','meas'].forEach(t => {
    document.getElementById('ot-'+t).classList.toggle('active', t===tab);
    document.getElementById('op-'+t).style.display = t===tab ? '' : 'none';
  });
}

function copyTbl(id, btn) {
  const rows = document.getElementById(id).querySelectorAll('tr');
  const text = [...rows].map(r=>[...r.querySelectorAll('th,td')].map(c=>c.textContent).join('\t')).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied!'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('ok'); }, 1600);
  });
}

/* ─── Init ───────────────────────────────────────────────── */
new ResizeObserver(resize).observe(canvas.parentElement);
resize();

// Pre-populate Gate with a simple pulse as example
(function() {
  const tt = parseFloat(document.getElementById('t_total').value)||100;
  const vm = vMin(), vM = vMax();
  const nodes = [
    {t: 0/tt, v: (1-vm)/(vM-vm)},
    {t: 10/tt, v: (1-vm)/(vM-vm)},
    {t: 10/tt + .001/tt, v: (0-vm)/(vM-vm)},
    {t: 60/tt, v: (0-vm)/(vM-vm)},
    {t: 60/tt + .001/tt, v: (1-vm)/(vM-vm)},
    {t: 1, v: (1-vm)/(vM-vm)},
  ];
  // Drain: constant 1.8V
  const vd = 1.8;
  state.nodes.drain = [{t:0, v:(vd-vm)/(vM-vm)},{t:1, v:(vd-vm)/(vM-vm)}];
  // Gate: pulse example
  state.nodes.gate = nodes.map(n=>({t:clamp(n.t,0,1), v:clamp(n.v,0,1)}));
  redraw();
})();
